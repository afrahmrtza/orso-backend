name: Orso Backend CI

# Workflow ini akan berjalan setiap kali ada push atau pull request ke branch main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phpunit-tests:
    runs-on: ubuntu-latest

    # Menyiapkan database MySQL di dalam runner GitHub untuk keperluan testing
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: orso_db
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        # Menggunakan PHP 8.2 agar kompatibel dengan PHPUnit 11
        php-version: '8.2'
        extensions: pdo, pdo_mysql, mbstring, gd
        coverage: xdebug

    - name: Install Dependencies
      run: composer install --prefer-dist --no-progress

    - name: Create Upload Directories
      # Membuat folder yang dibutuhkan Controller agar tidak error saat memindahkan file
      run: |
        mkdir -p public/uploads/menu
        mkdir -p public/uploads/testimoni
        chmod -R 777 public/uploads

    - name: Set PHPUnit Permissions
      # Memberikan izin eksekusi pada file binari PHPUnit agar bisa dijalankan di Linux
      run: chmod +x vendor/bin/phpunit

    - name: Run White Box Tests
      # Menyisipkan variabel environment untuk koneksi database testing
      env:
        DB_HOST: 127.0.0.1
        DB_NAME: orso_db
        DB_USER: root
        DB_PASS: root
        MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY }}
      run: ./vendor/bin/phpunit tests