version: '3.8'

services:
  # Service untuk Backend Slim kamu
  app:
    build: .
    container_name: orso-backend
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - orso-network

  # Service untuk Database MySQL
  db:
    image: mysql:8.0
    container_name: orso-mysql
    restart: always
    environment:
      MYSQL_DATABASE: orso_db
      MYSQL_ROOT_PASSWORD: password_kamu
    ports:
      - "3306:3306"
    networks:
      - orso-network

networks:
  orso-network:
    driver: bridge